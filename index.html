<!DOCTYPE html>
<html>
<head>
<title>Web Development Minor Project</title>

<style>
body{
font-family: Arial;
background: #f4f6f9;
text-align: center;
}

h1{
background:#2c3e50;
color:white;
padding:15px;
}

form{
background:white;
width:40%;
margin:auto;
padding:20px;
box-shadow:0 0 10px gray;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

table{
width:80%;
margin:30px auto;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#34495e;
color:white;
}

.edit{
background:#f39c12;
color:white;
border:none;
padding:5px;
cursor:pointer;
}

.delete{
background:#e74c3c;
color:white;
border:none;
padding:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>
WEB DEVELOPMENT MINOR PROJECT<br>
Student Management System<br>
By Tanishka Vikas Dhumal<br>
Course: Web Development
</h1>

<form id="studentForm">
<input type="hidden" id="editIndex">

<input type="text" id="name" placeholder="Enter Name" required>
<input type="email" id="email" placeholder="Enter Email" required>
<input type="text" id="course" placeholder="Enter Course" required>

<button type="submit">Add Student</button>
</form>

<h2>Student Records</h2>

<table id="studentTable">
<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Action</th>
</tr>
</table>

<script>
let students = [];

document.getElementById("studentForm").addEventListener("submit", function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let course = document.getElementById("course").value;
let editIndex = document.getElementById("editIndex").value;

if(editIndex === ""){
students.push({name, email, course});
}else{
students[editIndex] = {name, email, course};
document.getElementById("editIndex").value = "";
}

displayStudents();
this.reset();
});

function displayStudents(){
let table = document.getElementById("studentTable");
table.innerHTML = `
<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Action</th>
</tr>
`;

students.forEach((student, index) => {
table.innerHTML += `
<tr>
<td>${student.name}</td>
<td>${student.email}</td>
<td>${student.course}</td>
<td>
<button class="edit" onclick="editStudent(${index})">Edit</button>
<button class="delete" onclick="deleteStudent(${index})">Delete</button>
</td>
</tr>
`;
});
}

function editStudent(index){
document.getElementById("name").value = students[index].name;
document.getElementById("email").value = students[index].email;
document.getElementById("course").value = students[index].course;
document.getElementById("editIndex").value = index;
}

function deleteStudent(index){
students.splice(index,1);
displayStudents();
}
</script>

</body>
</html>
